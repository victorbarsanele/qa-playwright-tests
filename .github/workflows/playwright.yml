name: Playwright Tests

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: playwright-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

on:
    pull_request:
        branches: [main, master]
    push:
        branches: [main, master]
    schedule:
        - cron: '0 2 * * *'
    workflow_dispatch:

jobs:
    pr_auth_smoke:
        if: github.event_name == 'pull_request'
        timeout-minutes: 20
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: lts/*
                  cache: npm
            - name: Install dependencies
              run: npm ci
            - name: Install Playwright Browsers
              run: npx playwright install --with-deps chromium
            - name: Run PR auth smoke (Chromium)
              run: npm run test:auth:smoke
            - uses: actions/upload-artifact@v4
              if: failure() && !cancelled()
              with:
                  name: playwright-report-pr-auth-smoke
                  path: playwright-report/
                  retention-days: 14

    main_full_chromium:
        if: github.event_name == 'push'
        timeout-minutes: 40
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: lts/*
                  cache: npm
            - name: Install dependencies
              run: npm ci
            - name: Install Playwright Browsers
              run: npx playwright install --with-deps chromium
            - name: Run full suite (Chromium)
              run: npm run test:full:chromium
              continue-on-error: true
            - uses: actions/upload-pages-artifact@v3
              with:
                  path: playwright-report/

    deploy:
        needs: main_full_chromium
        if: github.event_name == 'push'
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - uses: actions/deploy-pages@v4
              id: deployment

    nightly_cross_browser:
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        timeout-minutes: 60
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                project: [chromium, firefox, webkit]
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: lts/*
                  cache: npm
            - name: Install dependencies
              run: npm ci
            - name: Install Playwright Browsers
              run: npx playwright install --with-deps
            - name: Run nightly full suite (${{ matrix.project }})
              run: npm run test:full -- --project=${{ matrix.project }}
            - uses: actions/upload-artifact@v4
              if: failure() && !cancelled()
              with:
                  name: playwright-report-nightly-${{ matrix.project }}
                  path: playwright-report/
                  retention-days: 14
